<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="科科命理宇宙站 v0.2.4.1，手機優先的 Soul Map 命盤儀表板。"
  />
  <title>科科命理宇宙站｜Soul Map 命盤儀表板</title>
  <link rel="stylesheet" href="./style.css?v=0.2.4.1" />
</head>
<body>
  <div class="site-shell">
    <aside class="desktop-sidebar" aria-label="桌機側欄導覽">
      <a class="brand-mark" href="#top" aria-label="回到首頁">
        <span class="brand-sigil" aria-hidden="true">星</span>
        <span>
          <strong>科科命理宇宙站</strong>
          <small>Soul Map</small>
        </span>
      </a>
      <nav class="sidebar-nav" id="desktopNav"></nav>
      <section class="sidebar-sync" aria-label="資料工具摘要">
        <span class="sync-icon" aria-hidden="true">雲</span>
        <div>
          <strong>資料備份與同步</strong>
          <small>JSON / 匯入 / 備份紀錄</small>
        </div>
      </section>
    </aside>

    <div class="page-canvas">
      <header class="topbar" id="top">
        <button class="mobile-menu" type="button" aria-label="開啟導覽">☰</button>
        <div class="topbar-title">
          <p>從不同命理系統，看見同一個自己</p>
          <h1>科科命理宇宙站</h1>
          <span>Soul Map 命盤儀表板</span>
          <span class="version-badge mobile-version" id="mobileVersionBadge">v0.2.4.1</span>
        </div>
        <div class="desktop-actions" id="topbarActions" aria-label="桌機工具列"></div>
        <button class="mobile-bell" type="button" aria-label="提醒">鈴</button>
      </header>

      <main class="dashboard" aria-label="科科命理宇宙站首頁儀表板">
        <section id="profileCard" class="hero-card" aria-labelledby="profile-title" aria-label="本命摘要"></section>
        <section id="todayCard" class="card today-card" aria-labelledby="today-title" aria-label="今日科科摘要"></section>
        <section id="numerologyCard" class="card numerology-card" aria-labelledby="life-number-title" aria-label="生命靈數"></section>
        <section id="moduleCard" class="card module-card" aria-labelledby="module-title" aria-label="命理模組入口"></section>
        <section id="almanacCard" class="card almanac-card" aria-labelledby="almanac-title" aria-label="今日農民曆"></section>
        <section id="deityCard" class="card deity-card" aria-labelledby="deity-title" aria-label="今日神明生日"></section>
        <section id="treeCard" class="card tree-card" aria-labelledby="tree-title" aria-label="命樹"></section>
        <section id="toolsCard" class="card tools-card" aria-labelledby="tool-title" aria-label="資料工具區"></section>
      </main>
    </div>
  </div>

  <nav class="mobile-tabbar" aria-label="手機底部導覽">
    <a href="#top" aria-current="page">首頁</a>
    <a href="#module-title">命盤</a>
    <a href="#almanac-title">農曆</a>
    <a href="#deity-title">占問</a>
    <a href="#tool-title">我的</a>
  </nav>

  <script src="./vendor/lunar/lunar.js?v=0.2.4.1"></script>
  <script src="./features/almanac-engine.js?v=0.2.4.1"></script>
  <script src="./data/deity-birthdays.js?v=0.2.4.1"></script>
  <script src="./features/date-test-mode.js?v=0.2.4.1"></script>
  <script src="./features/deity-matcher.js?v=0.2.4.1"></script>
  <script src="./data/site-data.js?v=0.2.4.1" data-source="KekeSoulData"></script>
  <script src="./app.js?v=0.2.4.1" defer></script>
</body>
</html>
