<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="科科命理宇宙站 v0.5.1.2，手機優先的 Soul Map 命盤總控台。"
  />
  <title>科科命理宇宙站｜Soul Map 命盤總控台</title>
  <link rel="stylesheet" href="./style.css?v=0.5.1.2" />
</head>
<body>
  <div class="site-shell">
    <aside class="desktop-sidebar" aria-label="桌機側邊導覽">
      <a class="brand-mark" href="#/dashboard" aria-label="回到總控台">
        <span class="brand-sigil" aria-hidden="true">✦</span>
        <span>
          <strong>科科命理宇宙站</strong>
          <small>Soul Map</small>
        </span>
      </a>
      <nav class="sidebar-nav" id="desktopNav"></nav>
      <section class="sidebar-sync" aria-label="資料備份與同步提示">
        <span class="sync-icon" aria-hidden="true">☁</span>
        <div>
          <strong>資料備份與同步</strong>
          <small>JSON / 匯入 / 備份紀錄</small>
        </div>
      </section>
    </aside>

    <div class="page-canvas">
      <header class="topbar" id="top">
        <button class="mobile-menu" type="button" aria-label="開啟導覽">☰</button>
        <div class="topbar-title">
          <p>從不同命理系統，看見同一個自己</p>
          <h1>科科命理宇宙站</h1>
          <span>Soul Map 命盤總控台</span>
          <span class="version-badge mobile-version" id="mobileVersionBadge">v0.5.1.2</span>
        </div>
        <div class="desktop-actions" id="topbarActions" aria-label="桌機工具列"></div>
        <button class="mobile-bell" type="button" aria-label="今日提醒">鈴</button>
      </header>

      <main class="dashboard dashboard-layout dashboard-main-grid dashboard-blueprint-layout" id="dashboardView" aria-label="科科命理宇宙站首頁儀表板">
        <section class="dashboard-zone dashboard-hero-zone dashboard-core-cluster" aria-label="本命與命盤核心">
          <section id="profileCard" class="hero-card" aria-labelledby="profile-title" aria-label="本命摘要"></section>
          <section id="moduleCard" class="card module-card core-card is-primary" aria-labelledby="module-title" aria-label="命盤核心入口"></section>
        </section>

        <section class="dashboard-zone dashboard-rhythm-zone dashboard-rhythm-cluster" aria-label="今日節奏與命樹">
          <section id="todayCard" class="card today-card core-card" aria-labelledby="today-title" aria-label="今日科科摘要"></section>
          <section id="numerologyCard" class="card numerology-card core-card is-compact" aria-labelledby="life-number-title" aria-label="生命靈數"></section>
          <section id="treeCard" class="card tree-card core-card" aria-labelledby="tree-title" aria-label="命樹"></section>
        </section>

        <section class="dashboard-zone dashboard-support-zone dashboard-support-cluster" aria-label="輔助提醒與資料工具">
          <section id="almanacCard" class="card almanac-card support-card compact-card" aria-labelledby="almanac-title" aria-label="農民曆小提醒"></section>
          <section id="deityCard" class="card deity-card support-card compact-card" aria-labelledby="deity-title" aria-label="神明生日輔助提醒"></section>
          <section id="toolsCard" class="card tools-card support-card" aria-labelledby="tool-title" aria-label="資料工具區"></section>
        </section>
      </main>

      <main class="detail-view" id="detailView" aria-label="命盤詳情頁" hidden></main>
    </div>
  </div>

  <nav class="mobile-tabbar" aria-label="手機底部導覽">
    <a href="#/dashboard" aria-label="首頁">首</a>
    <a href="#/module/ziwei" aria-label="命盤">命</a>
    <a href="#almanac-title" aria-label="農曆">曆</a>
    <a href="#/module/yijing" aria-label="占問">占</a>
    <a href="#tool-title" aria-label="我的">我</a>
  </nav>

  <script src="./vendor/lunar/lunar.js?v=0.5.1.2"></script>
  <script src="./features/almanac-engine.js?v=0.5.1.2"></script>
  <script src="./data/deity-birthdays.js?v=0.5.1.2"></script>
  <script src="./features/date-test-mode.js?v=0.5.1.2"></script>
  <script src="./features/deity-matcher.js?v=0.5.1.2"></script>
  <script src="./data/detail-pages-data.js?v=0.5.1.2"></script>
  <script src="./features/router.js?v=0.5.1.2"></script>
  <script src="./data/site-data.js?v=0.5.1.2" data-source="KekeSoulData"></script>
  <script src="./app.js?v=0.5.1.2" defer></script>
</body>
</html>
